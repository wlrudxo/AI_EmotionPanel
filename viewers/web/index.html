<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Emotion Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e2e;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .image-container {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .emotion-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 16px;
    transition: opacity 0.4s ease-in-out;
  }

  .emotion-img.hidden { opacity: 0; }
  .emotion-img.visible { opacity: 1; }

  .speech-bubble {
    background: #2a2a3e;
    border: 1px solid #444;
    border-radius: 14px;
    padding: 12px 20px;
    text-align: center;
    max-width: 300px;
    min-width: 200px;
    position: relative;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .speech-bubble.show {
    opacity: 1;
    transform: translateY(0);
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -7px;
    left: 50%;
    width: 12px;
    height: 12px;
    background: #2a2a3e;
    border-left: 1px solid #444;
    border-top: 1px solid #444;
    transform: translateX(-50%) rotate(45deg);
  }

  .line-text {
    font-weight: 700;
    font-size: 15px;
    color: #e0e0e0;
  }

  .status-text {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  .emotion-label {
    font-size: 11px;
    color: #555;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img id="img-a" class="emotion-img visible" />
      <img id="img-b" class="emotion-img hidden" />
    </div>
    <div id="bubble" class="speech-bubble">
      <div id="line" class="line-text"></div>
      <div id="status" class="status-text"></div>
    </div>
    <div id="label" class="emotion-label"></div>
  </div>

  <script>
    const imgA = document.getElementById('img-a');
    const imgB = document.getElementById('img-b');
    const bubble = document.getElementById('bubble');
    const lineEl = document.getElementById('line');
    const statusEl = document.getElementById('status');
    const labelEl = document.getElementById('label');

    let currentFront = 'a';
    let lastEmotion = '';

    async function poll() {
      try {
        const res = await fetch('/api/state');
        const state = await res.json();

        if (state.emotion !== lastEmotion) {
          lastEmotion = state.emotion;
          const src = '/assets/' + state.emotion + '.webp';
          const front = currentFront === 'a' ? imgA : imgB;
          const back = currentFront === 'a' ? imgB : imgA;
          back.onload = () => {
            front.classList.replace('visible', 'hidden');
            back.classList.replace('hidden', 'visible');
            currentFront = currentFront === 'a' ? 'b' : 'a';
          };
          back.src = src;
        }

        const hasText = state.line || state.statusLine;
        if (hasText) {
          lineEl.textContent = state.line || '';
          statusEl.textContent = state.statusLine ? '(' + state.statusLine + ')' : '';
          bubble.classList.add('show');
        } else {
          bubble.classList.remove('show');
        }

        labelEl.textContent = state.emotion;
      } catch {}
    }

    poll();
    setInterval(poll, 300);
  </script>
</body>
</html>
